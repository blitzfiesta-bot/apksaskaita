<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{font-family:system-ui,sans-serif;background:#0A0A0F;color:#F0EFE8;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:24px;box-sizing:border-box}
.box{text-align:center;max-width:320px}
.icon{font-size:64px;margin-bottom:24px}
h2{font-size:22px;font-weight:700;margin-bottom:10px}
p{color:rgba(240,239,232,.5);font-size:14px;line-height:1.7;margin-bottom:28px}
button{background:#2F5FE0;color:#fff;border:none;padding:14px 28px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer}
</style>
</head>
<body>
<div class="box">
  <div class="icon">📵</div>
  <h2>Nėra interneto</h2>
  <p>Patikrinkite Wi-Fi arba mobilųjį ryšį ir bandykite dar kartą</p>
  <button onclick="window.location.reload()">Bandyti dar kartą</button>
</div>
</body>
</html>
